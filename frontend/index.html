<!DOCTYPE html>
<html>
<head>
  <title>Fin Sea Scan</title>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    #map {
      height: 100vh;
      width: 75%;
    }

    #sidebar {
      width: 25%;
      background: #020617;
      padding: 15px;
      overflow-y: auto;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
    }

    .ship {
      padding: 8px;
      border-bottom: 1px solid #1f2937;
      cursor: pointer;
    }

    .ship:hover {
      background: #1f2937;
    }

    .popup img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <h2>🚢 Fin Sea Scan</h2>

  <input id="search" placeholder="Search MMSI..." />

  <div id="shipList"></div>
</div>

<script>

const API = "https://fin-sea-scan-enterprise.onrender.com";

const map = L.map('map').setView([60, 24], 6);

// DARK MAP
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const shipList = document.getElementById("shipList");
const markers = {};

// COLOR
function getColor(speed) {
  if (speed > 20) return "red";
  if (speed > 10) return "orange";
  return "lime";
}

// -------------------
// LOAD SHIPS
// -------------------
fetch(API + "/public/ships")
  .then(res => res.json())
  .then(data => {

    data.features.slice(0, 300).forEach(ship => {

      const lat = ship.geometry.coordinates[1];
      const lon = ship.geometry.coordinates[0];
      const mmsi = ship.properties.mmsi;
      const speed = ship.properties.sog || 0;
      const cog = ship.properties.cog || "-";

      // marker
      const marker = L.circleMarker([lat, lon], {
        color: getColor(speed),
        radius: 6
      }).addTo(map);

      markers[mmsi] = marker;

      // popup
      const popup = `
        <div class="popup">
          <img src="https://source.unsplash.com/400x200/?ship" />
          <b>MMSI:</b> ${mmsi}<br>
          <b>Speed:</b> ${speed} kn<br>
          <b>Course:</b> ${cog}
        </div>
      `;

      marker.bindPopup(popup);

      // sidebar item
      const el = document.createElement("div");
      el.className = "ship";
      el.innerText = "MMSI: " + mmsi;

      el.onclick = () => {
        map.setView([lat, lon], 10);
        marker.openPopup();
      };

      shipList.appendChild(el);

    });

  });

// -------------------
// SEARCH
// -------------------
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value;

  Object.keys(markers).forEach(mmsi => {
    if (mmsi.includes(val)) {
      markers[mmsi].setStyle({ opacity: 1 });
    } else {
      markers[mmsi].setStyle({ opacity: 0.1 });
    }
  });
});

// -------------------
// ALERTS
// -------------------
fetch(API + "/enterprise/alerts", {
  headers: { "x-api-key": "demo_key_123" }
})
.then(res => res.json())
.then(alerts => {
  alerts.slice(0, 20).forEach(a => {

    const lat = 60 + Math.random() * 5;
    const lon = 20 + Math.random() * 10;

    L.circle([lat, lon], {
      color: 'red',
      radius: 20000
    }).addTo(map);

  });
});

// -------------------
// WEATHER
// -------------------
fetch(API + "/weather")
.then(res => res.json())
.then(data => {

  data.forEach(w => {

    const lat = 60 + Math.random() * 5;
    const lon = 20 + Math.random() * 10;

    L.circle([lat, lon], {
      color: 'blue',
      radius: 20000 + (w.wind * 1000)
    }).addTo(map);

  });

});

</script>

</body>
</html>
