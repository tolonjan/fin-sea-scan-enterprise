<!DOCTYPE html>
<html>
<head>
  <title>Fin Sea Scan</title>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; display: flex; font-family: Arial; background:#0b0f19; color:white; }

    #map { height: 100vh; width: 75%; }
    #sidebar { width: 25%; background:#111827; padding:20px; overflow:auto; }

    .card { background:#1f2937; padding:10px; margin-bottom:10px; border-radius:6px; }
    .alert { background:#7f1d1d; padding:6px; margin-bottom:5px; border-radius:4px; }

    .popup {
      font-size: 14px;
      line-height: 1.4;
    }

    .popup h3 {
      margin: 0 0 5px 0;
      font-size: 16px;
    }

    .badge {
      display:inline-block;
      padding:2px 6px;
      border-radius:4px;
      font-size:12px;
      margin-top:4px;
    }

    .fast { background:#dc2626; }
    .medium { background:#f59e0b; }
    .slow { background:#16a34a; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <h2>🚢 Fin Sea Scan</h2>

  <div class="card">
    <b>Selected Vessel</b>
    <div id="selected">Click a ship</div>
  </div>

  <div class="card">
    <b>Alerts</b>
    <div id="alerts"></div>
  </div>
</div>

<script>

// LOGIN (simple paywall)
const password = "demo123";
const input = prompt("Enter access code:");
if (input !== password) {
  document.body.innerHTML = "Access denied";
}

// CONFIG
const API = "https://fin-sea-scan-enterprise.onrender.com";

// MAP
const map = L.map('map').setView([60, 24], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const selectedDiv = document.getElementById("selected");
const alertsDiv = document.getElementById("alerts");

// SPEED COLOR
function getColor(speed) {
  if (speed > 20) return "red";
  if (speed > 10) return "orange";
  return "green";
}

// SPEED BADGE
function getBadge(speed) {
  if (speed > 20) return "fast";
  if (speed > 10) return "medium";
  return "slow";
}

// -------------------
// SHIPS
// -------------------
fetch(API + "/public/ships")
  .then(res => res.json())
  .then(data => {

    data.features.slice(0, 200).forEach(ship => {

      const lat = ship.geometry.coordinates[1];
      const lon = ship.geometry.coordinates[0];
      const mmsi = ship.properties.mmsi;
      const speed = ship.properties.sog || 0;
      const cog = ship.properties.cog || "-";
      const heading = ship.properties.trueHeading || "-";

      const marker = L.circleMarker([lat, lon], {
        color: getColor(speed),
        radius: 6
      }).addTo(map);

      const popupHTML = `
        <div class="popup">
          <h3>🚢 Vessel</h3>
          <b>MMSI:</b> ${mmsi}<br>
          <b>Speed:</b> ${speed} kn<br>
          <b>Course:</b> ${cog}<br>
          <b>Heading:</b> ${heading}<br>
          <span class="badge ${getBadge(speed)}">${speed > 20 ? "Fast" : speed > 10 ? "Medium" : "Slow"}</span>
        </div>
      `;

      marker.bindPopup(popupHTML);

      marker.on("click", () => {
        selectedDiv.innerHTML = popupHTML;
      });

      marker.on("mouseover", function () {
        this.openPopup();
      });

    });

  });

// -------------------
// ALERTS
// -------------------
fetch(API + "/enterprise/alerts", {
  headers: { "x-api-key": "demo_key_123" }
})
  .then(res => res.json())
  .then(alerts => {

    alerts.slice(0, 20).forEach(alert => {

      const el = document.createElement("div");
      el.className = "alert";
      el.innerText = alert.risks.join(", ");
      alertsDiv.appendChild(el);

      const lat = 60 + Math.random() * 5;
      const lon = 20 + Math.random() * 10;

      L.circle([lat, lon], {
        color: 'red',
        radius: 20000
      }).addTo(map);
    });

  });

// -------------------
// WEATHER (FMI)
// -------------------
fetch(API + "/weather")
  .then(res => res.json())
  .then(data => {

    data.forEach(w => {

      const lat = 60 + Math.random() * 5;
      const lon = 20 + Math.random() * 10;

      L.circle([lat, lon], {
        color: 'blue',
        fillOpacity: 0.2,
        radius: 20000 + (w.wind * 1000)
      }).addTo(map)
      .bindPopup("🌬 Wind: " + w.wind + " m/s");

    });

  });

// -------------------
// ICE (demo)
// -------------------
for (let i = 0; i < 6; i++) {
  const lat = 62 + Math.random() * 5;
  const lon = 20 + Math.random() * 10;

  L.circle([lat, lon], {
    color: 'white',
    fillOpacity: 0.3,
    radius: 40000
  }).addTo(map).bindPopup("🧊 Ice area");
}

</script>

</body>
</html>
