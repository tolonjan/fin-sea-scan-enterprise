<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<title>Fin Sea Scan Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

#map {
  position:absolute;
  top:0;
  left:0;
  right:320px;
  bottom:0;
}

#sidebar {
  position:absolute;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#0b1220;
  padding:20px;
}

input {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <h2>🚢 Fin Sea Scan Pro</h2>
  <input id="search" placeholder="Search MMSI..." />
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([60.17, 24.94], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let markers = [];
let tracks = {};

function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function createShipIcon(heading) {
  return L.divIcon({
    html: `<div style="
      transform: rotate(${heading || 0}deg);
      font-size:18px;
    ">🚢</div>`,
    className: ""
  });
}

function loadShips() {

  fetch("https://meri.digitraffic.fi/api/ais/v1/locations")
    .then(r => r.json())
    .then(data => {

      clearMap();

      data.features.forEach(ship => {

        try {
          const coords = ship.geometry.coordinates;
          const props = ship.properties;

          if (!coords || !props) return;

          const lat = coords[1];
          const lon = coords[0];
          const mmsi = props.mmsi;
          const speed = props.sog || 0;
          const heading = props.trueHeading || 0;

          // 🚢 ICON
          const marker = L.marker([lat, lon], {
            icon: createShipIcon(heading)
          }).addTo(map);

          // 📈 TRACK LINE
          if (!tracks[mmsi]) tracks[mmsi] = [];

          tracks[mmsi].push([lat, lon]);

          if (tracks[mmsi].length > 10) {
            tracks[mmsi].shift();
          }

          L.polyline(tracks[mmsi], {
            color: "cyan",
            weight: 1
          }).addTo(map);

          // 💬 POPUP
          marker.bindPopup(`
            <div style="color:black">
              <b>MMSI:</b> ${mmsi}<br>
              <b>Speed:</b> ${speed} kn<br>
              <b>Heading:</b> ${heading}
            </div>
          `);

          marker.mmsi = mmsi;

          markers.push(marker);

        } catch(e) {}

      });

    });
}

loadShips();
setInterval(loadShips, 20000);

// 🔍 SEARCH
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value;

  markers.forEach(m => {
    if (!val || m.mmsi.toString().includes(val)) {
      m.getElement().style.filter = "drop-shadow(0 0 6px yellow)";
    } else {
      m.getElement().style.filter = "";
    }
  });
});

</script>

</body>
</html>
