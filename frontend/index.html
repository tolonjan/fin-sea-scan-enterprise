<!DOCTYPE html>
<html>
<head>
  <title>Fin Sea Scan</title>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; background: #0b0f19; color: white; display: flex; }

    #map { height: 100vh; width: 75%; }

    #sidebar {
      width: 25%;
      background: #111827;
      padding: 20px;
      overflow-y: auto;
    }

    h2 { margin-top: 0; }

    .card {
      background: #1f2937;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    .alert {
      background: #7f1d1d;
      padding: 8px;
      border-radius: 5px;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <h2>🚢 Fin Sea Scan</h2>

  <div class="card">
    <b>Selected Vessel</b>
    <div id="selected">Click a ship</div>
  </div>

  <div class="card">
    <b>Alerts</b>
    <div id="alerts"></div>
  </div>
</div>

<script>
const API = "https://fin-sea-scan-enterprise.onrender.com";

const map = L.map('map').setView([60, 24], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// SELECTED UI
const selectedDiv = document.getElementById("selected");
const alertsDiv = document.getElementById("alerts");

// SHIPS
fetch(API + "/public/ships")
  .then(res => res.json())
  .then(data => {

    data.features.slice(0, 200).forEach(ship => {

      const lat = ship.geometry.coordinates[1];
      const lon = ship.geometry.coordinates[0];
      const mmsi = ship.properties.mmsi;
      const speed = ship.properties.sog;

      const marker = L.marker([lat, lon]).addTo(map);

      marker.on("click", () => {
        selectedDiv.innerHTML =
          "<b>MMSI:</b> " + mmsi + "<br>" +
          "<b>Speed:</b> " + speed + " kn";
      });

    });

  });

// ALERTS
fetch(API + "/enterprise/alerts", {
  headers: { "x-api-key": "demo_key_123" }
})
  .then(res => res.json())
  .then(alerts => {

    alerts.slice(0, 20).forEach(alert => {

      const el = document.createElement("div");
      el.className = "alert";
      el.innerText = alert.risks.join(", ");

      alertsDiv.appendChild(el);

      // kartalle myös
      const lat = 60 + Math.random() * 5;
      const lon = 20 + Math.random() * 10;

      L.circle([lat, lon], {
        color: 'red',
        radius: 20000
      }).addTo(map);
    });

  });
</script>

</body>
</html>
