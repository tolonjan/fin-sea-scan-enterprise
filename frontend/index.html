<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <title>Fin Sea Scan Pro</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    #map {
      position: absolute;
      top: 0;
      left: 0;
      right: 320px;
      bottom: 0;
    }

    #sidebar {
      position: absolute;
      right: 0;
      top: 0;
      width: 320px;
      height: 100%;
      background: #0b1220;
      padding: 20px;
      box-shadow: -4px 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 20px;
    }

    .info {
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <h1>🚢 Fin Sea Scan Pro</h1>
  <input id="search" placeholder="Search MMSI..." />
  <div class="info">Live AIS data (Digitraffic)</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([60.17, 24.94], 5);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  let markers = [];

  function clearMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
  }

  function loadShips() {

    fetch("https://meri.digitraffic.fi/api/ais/v1/locations")
      .then(r => r.json())
      .then(data => {

        clearMarkers();

        data.features.forEach(ship => {

          try {
            const coords = ship.geometry.coordinates;
            const props = ship.properties;

            if (!coords || !props) return;

            const lat = coords[1];
            const lon = coords[0];

            const speed = props.sog || 0;
            const mmsi = props.mmsi || "N/A";

            const marker = L.circleMarker([lat, lon], {
              radius: 5,
              color: speed > 15 ? "red" : "lime",
              fillOpacity: 0.8
            }).addTo(map);

            marker.bindPopup(`
              <div style="color:black">
                <b>MMSI:</b> ${mmsi}<br>
                <b>Speed:</b> ${speed}<br>
                <b>Heading:</b> ${props.trueHeading || "-"}
              </div>
            `);

            markers.push(marker);

          } catch (e) {}

        });

      })
      .catch(err => {
        console.error("API error:", err);
      });
  }

  // Load immediately
  loadShips();

  // Refresh every 30s
  setInterval(loadShips, 30000);

  // Search
  document.getElementById("search").addEventListener("input", function(e) {
    const value = e.target.value;

    markers.forEach(m => {
      const content = m.getPopup().getContent();

      if (content.includes(value)) {
        m.setStyle({ color: "yellow" });
      } else {
        m.setStyle({ color: "lime" });
      }
    });
  });

</script>

</body>
</html>
